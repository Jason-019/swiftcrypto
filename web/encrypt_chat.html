<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 SwiftCrypto Web</title>
<style>
/* ══════════════════════════════════════════
   SwiftCrypto Web v2 — Premium Design
   ══════════════════════════════════════════ */
:root {
    --bg: #0a0a0f;
    --card: rgba(15,15,30,0.72);
    --accent: #a78bfa;
    --accent2: #7c3aed;
    --text: #e2e0e7;
    --text-dim: #8888a0;
    --border: rgba(255,255,255,0.06);
    --radius: 16px;
    --radius-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', system-ui, sans-serif;
    min-height: 100vh; color: var(--text);
    display: flex; justify-content: center; align-items: flex-start;
    padding: 32px 16px; background: var(--bg);
    transition: background 0.5s; position: relative; overflow-x: hidden;
    color-scheme: dark;
}

#bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background-size: cover; background-position: center;
    opacity: 0; transition: opacity 0.6s; pointer-events: none;
}
#bg-layer.visible { opacity: 1; }
#bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: var(--bg); opacity: 0.88;
    transition: opacity 0.4s; pointer-events: none;
}

.container { position: relative; z-index: 2; max-width: 780px; width: 100%; }

.header { text-align: center; margin-bottom: 24px; }
.header h1 {
    font-size: 2rem; font-weight: 700; letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), #e879f9, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px;
}
.header .subtitle { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 2px; }

.toolbar {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px;
    backdrop-filter: blur(20px); display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
}
.toolbar label { font-size: 0.82rem; color: var(--text-dim); white-space: nowrap; font-weight: 500; }
.toolbar input[type="password"], .toolbar input[type="text"] {
    flex: 1; min-width: 140px; padding: 9px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: rgba(255,255,255,0.04);
    color: var(--text); font-size: 0.9rem; outline: none; transition: 0.25s;
}
.toolbar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(167,139,250,0.1); }
.toolbar .icon-btn {
    width: 38px; height: 38px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: rgba(255,255,255,0.04);
    color: var(--text); cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: 0.25s; flex-shrink: 0;
}
.toolbar .icon-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
.toolbar .icon-btn.active { background: var(--accent2); border-color: var(--accent2); }
.toolbar input[type="file"] { display: none; }
.toolbar .custom-select {
    position: relative; min-width: 190px; max-width: 200px; z-index: 50;
}
.custom-select .select-trigger {
    width: 100%; padding: 8px 30px 8px 10px; border-radius: 10px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.04);
    color: var(--text); font-size: 0.85rem; cursor: pointer;
    text-align: left; outline: none; transition: 0.25s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.custom-select .select-trigger:hover { border-color: var(--accent); }
.custom-select .select-trigger::after {
    content: '▾'; position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%); color: var(--text-dim); font-size: 0.7rem; pointer-events: none;
}
.custom-select .select-options {
    display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    border-radius: 10px; border: 1px solid var(--border);
    background: rgba(20,20,40,0.98); backdrop-filter: blur(20px);
    z-index: 50; max-height: 76px; overflow-y: auto;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.custom-select.open .select-options { display: block; }
.custom-select .select-option {
    padding: 9px 12px; cursor: pointer; font-size: 0.82rem; color: var(--text);
    transition: 0.15s; white-space: nowrap;
}
.custom-select .select-option:hover { background: rgba(167,139,250,0.2); }
.custom-select .select-option.selected { color: var(--accent); font-weight: 600; }
.custom-select .select-option.custom-opt { border-top: 1px solid var(--border); color: #6ee7b7; }

.card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 12px;
    backdrop-filter: blur(20px); transition: 0.25s;
}
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.card-header .icon { font-size: 1.3rem; }
.card-header h2 { font-size: 0.95rem; font-weight: 600; }

textarea {
    width: 100%; min-height: 110px; padding: 14px;
    border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: rgba(0,0,0,0.25); color: var(--text);
    font-size: 0.92rem; font-family: inherit; line-height: 1.6;
    resize: vertical; outline: none; transition: 0.25s;
}
textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(167,139,250,0.08); }
textarea[readonly] { background: rgba(0,0,0,0.15); }

.btn-row { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center; }
.btn {
    padding: 9px 18px; border-radius: var(--radius-sm);
    border: none; cursor: pointer; font-size: 0.85rem;
    font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
    transition: 0.25s; white-space: nowrap;
}
.btn-primary { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,237,0.35); }
.btn-secondary { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: rgba(255,255,255,0.12); }
.btn-copy { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
.btn-copy:hover { background: rgba(16,185,129,0.25); }
.char-count { font-size: 0.75rem; color: var(--text-dim); margin-left: auto; }

.toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #10b981; color: #fff; padding: 10px 24px; border-radius: 20px;
    font-size: 0.85rem; z-index: 999; opacity: 0; pointer-events: none;
    transition: opacity 0.3s; box-shadow: 0 8px 30px rgba(16,185,129,0.3);
}
.toast.show { opacity: 1; }

@media (max-width: 560px) {
    body { padding: 12px 8px; }
    .header h1 { font-size: 1.4rem; }
    .toolbar { padding: 12px; gap: 8px; }
    .card { padding: 14px; }
    .btn { padding: 7px 12px; font-size: 0.8rem; }
}

/* ── 歌词挑选器模态框 ── */
#lyricModal {
    display: none; position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
    justify-content: center; align-items: center;
}
#lyricModal.show { display: flex; }
#lyricModal .modal-card {
    background: rgba(20,20,45,0.96); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; padding: 24px; max-width: 480px; width: 90%;
    max-height: 80vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.6);
}
#lyricModal .modal-card h3 { margin-bottom: 16px; font-size: 1rem; }
#lyricModal select {
    width: 100%; padding: 10px; border-radius: 10px; margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.06);
    color: #e2e0e7; font-size: 0.9rem; outline: none; cursor: pointer;
    color-scheme: dark;
}
#lyricModal select option {
    background: #1a1a2e; color: #e2e0e7;
}
#lyricModal select:disabled { opacity: 0.35; cursor: not-allowed; }
#lyricModal .lyric-preview {
    padding: 12px; border-radius: 10px; background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.06); min-height: 40px; margin-bottom: 14px;
    font-size: 0.9rem; color: #e2e0e7; font-style: italic; line-height: 1.5;
}
#lyricModal .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="bg-overlay"></div>

<div class="container">
    <div class="header">
        <h1>SwiftCrypto Web</h1>
        <p class="subtitle">AES‑256‑GCM  ·  PBKDF2  ·  端到端加密</p>
    </div>

    <div class="toolbar">
        <label>🔑 密码</label>
        <input type="password" id="password" placeholder="双方约定的共享密码…" autocomplete="off">
        <button class="icon-btn" id="togglePwd" onclick="togglePassword()" title="显示/隐藏密码">👁</button>
        <button class="icon-btn" onclick="genPwd()" title="生成随机密码" style="color:#fbbf24;">🎲</button>
        <button class="icon-btn" onclick="openLyricPicker()" title="从歌词库挑选密码" style="color:#a78bfa;">📜</button>

        <label>🎨 主题</label>
        <button class="icon-btn" onclick="prevTheme()" title="上一个主题">◀</button>
        <span id="themeName" style="min-width:160px;text-align:center;font-size:0.85rem;font-weight:500;">1989 (Taylor's Version)</span>
        <button class="icon-btn" onclick="nextTheme()" title="下一个主题">▶</button>
        <input type="file" id="bgFileInput" accept="image/*" onchange="loadCustomBg(this)" style="display:none;">

        <div class="range-group">
            <span>🌓</span>
            <input type="range" id="bgOpacity" min="0" max="100" value="100" oninput="updateBgOpacity(this.value)">
            <span id="bgOpacityVal">100%</span>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><span class="icon">🔒</span><h2>加密</h2></div>
        <textarea id="plainInput" placeholder="在此输入要加密的明文…"></textarea>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="doEncrypt()">🔒 加密</button>
            <button class="btn btn-copy" onclick="copyText('cipherOutput')">📋 复制密文</button>
            <button class="btn btn-secondary" onclick="clearArea('plainInput')">🗑 清空</button>
            <span class="char-count" id="cipherCount">密文: 0 字</span>
        </div>
        <textarea id="cipherOutput" placeholder="密文将显示在此…" readonly></textarea>
    </div>

    <div class="card">
        <div class="card-header"><span class="icon">🔓</span><h2>解密</h2></div>
        <textarea id="cipherInput" placeholder="在此粘贴要解密的密文…"></textarea>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="doDecrypt()">🔓 解密</button>
            <button class="btn btn-copy" onclick="copyText('plainOutput')">📋 复制明文</button>
            <button class="btn btn-secondary" onclick="clearArea('cipherInput')">🗑 清空</button>
            <span class="char-count" id="plainCount">明文: 0 字</span>
        </div>
        <textarea id="plainOutput" placeholder="明文将显示在此…" readonly></textarea>
    </div>

    <div style="text-align:center;font-size:0.7rem;color:var(--text-dim);padding:16px 0 32px;">
        加密在浏览器本地完成 · 无服务器 · 无日志
    </div>
</div>

<div class="toast" id="toast"></div>

<!-- ── 歌词挑选器模态框 ── -->
<div id="lyricModal">
    <div class="modal-card">
        <h3>📜 从歌词中挑选密码</h3>
        <select id="albumSelect" onchange="onAlbumChange()" disabled><option value="">— 选择专辑 —</option></select>
        <select id="songSelect" onchange="onSongChange()" disabled><option value="">— 选择歌曲 —</option></select>
        <select id="lyricSelect" onchange="onLyricChange()" disabled><option value="">— 选择歌词 —</option></select>
        <div class="lyric-preview" id="lyricPreview">选择专辑、歌曲、歌词后，此处预览…</div>
        <div class="modal-btns">
            <button class="btn btn-secondary" onclick="closeLyricPicker()">取消</button>
            <button class="btn btn-primary" id="useLyricBtn" onclick="useLyric()" disabled>🔑 用作密码</button>
        </div>
    </div>
</div>

<script>
const NONCE_SIZE=12, KEY_SIZE=256, ITERATIONS=600_000;
const SALT=new TextEncoder().encode('SwiftCryptoWeb_v2');

async function deriveKey(pwd){
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),'PBKDF2',false,['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2',salt:SALT,iterations:ITERATIONS,hash:'SHA-256'},
        km,{name:'AES-GCM',length:KEY_SIZE},false,['encrypt','decrypt']);
}

async function doEncrypt(){
    const pt=document.getElementById('plainInput').value;
    if(!pt)return toast('⚠️ 请输入要加密的文本');
    try{
        const key=await deriveKey(getPwd());
        const nonce=crypto.getRandomValues(new Uint8Array(NONCE_SIZE));
        const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv:nonce},key,new TextEncoder().encode(pt));
        const combined=new Uint8Array(nonce.length+ct.byteLength);
        combined.set(nonce);combined.set(new Uint8Array(ct),nonce.length);
        document.getElementById('cipherOutput').value=btoa(String.fromCharCode(...combined));
        updateCounts();toast('✅ 加密完成');
    }catch(e){toast('❌ '+e.message);}
}

async function doDecrypt(){
    const b64=document.getElementById('cipherInput').value.trim();
    if(!b64)return toast('⚠️ 请输入密文');
    try{
        const key=await deriveKey(getPwd());
        const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
        const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(0,NONCE_SIZE)},key,raw.slice(NONCE_SIZE));
        document.getElementById('plainOutput').value=new TextDecoder().decode(pt);
        updateCounts();toast('✅ 解密成功');
    }catch(e){
        toast(e.name==='OperationError'?'❌ 密码错误或密文被篡改':'❌ '+e.message);
    }
}

function getPwd(){return document.getElementById('password').value;}
function togglePassword(){
    const el=document.getElementById('password'),btn=document.getElementById('togglePwd');
    if(el.type==='password'){el.type='text';btn.textContent='🙈';btn.classList.add('active');}
    else{el.type='password';btn.textContent='👁';btn.classList.remove('active');}
}function genPwd(){
    const w='starlight wonder midnight crystal velvet golden crimson silver whisper shadow dawn autumn winter summer thunder lightning rainbow phoenix dragon eagle ocean river mountain forest meadow garden castle bridge tower mirror'.split(' ');
    const p=w[Math.floor(Math.random()*w.length)]+'-'+Math.floor(Math.random()*900+100)+'-'+w[Math.floor(Math.random()*w.length)];
    document.getElementById('password').value=p; document.getElementById('password').type='text';
    document.getElementById('togglePwd').textContent='🙈'; document.getElementById('togglePwd').classList.add('active');
    toast('🎲 '+p);
}function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function clearArea(id){document.getElementById(id).value='';updateCounts();}
async function copyText(id){
    const t=document.getElementById(id).value;
    if(!t)return toast('⚠️ 无内容');
    try{await navigator.clipboard.writeText(t);toast('✅ 已复制');}
    catch{document.getElementById(id).select();document.execCommand('copy');toast('✅ 已复制');}
}
function updateCounts(){
    document.getElementById('cipherCount').textContent='密文: '+document.getElementById('cipherOutput').value.length+' 字';
    document.getElementById('plainCount').textContent='明文: '+document.getElementById('plainOutput').value.length+' 字';
}

/* ══════════════════════════════════════════
   Theme Switcher & Background
   ══════════════════════════════════════════ */
const THEMES = [
    { name:'纯黑背景',            file:'' },
    { name:'Taylor Swift (Debut)',file:'taylorswift.jpg' },
    { name:'Fearless',            file:'fearless.jpg' },
    { name:'Speak Now',           file:'speaknow.jpg' },
    { name:'Red',                 file:'red.jpg' },
    { name:"1989 (Taylor's Version)",file:'1989.png' },
    { name:'Reputation',          file:'reputation.jpg' },
    { name:'Lover',               file:'lover.jpg' },
    { name:'Folklore',            file:'folklore.jpg' },
    { name:'Evermore',            file:'evermore.jpg' },
    { name:'Midnights',           file:'midnights.jpg' },
    { name:'Tortured Poets Dept', file:'ttpd.png' },
    { name:'📁 自定义照片…',      file:'__custom__' },
];
let themeIdx = 5; // 默认 1989

function applyTheme(filename){
    if(filename==='__custom__'){ document.getElementById('bgFileInput').click(); return; }
    const layer=document.getElementById('bg-layer');
    if(!filename){ layer.style.backgroundImage='';layer.classList.remove('visible'); }
    else { layer.style.backgroundImage=`url('../Background_Images/${filename}')`;layer.classList.add('visible'); }
}
function prevTheme(){ themeIdx=(themeIdx-1+THEMES.length)%THEMES.length; setTheme(); }
function nextTheme(){ themeIdx=(themeIdx+1)%THEMES.length; setTheme(); }
function setTheme(){
    const t=THEMES[themeIdx];
    document.getElementById('themeName').textContent=t.name;
    applyTheme(t.file);
}
function loadCustomBg(input){
    const file=input.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
        const layer=document.getElementById('bg-layer');
        layer.style.backgroundImage=`url(${e.target.result})`;
        layer.classList.add('visible');
        toast('🖼 自定义背景已加载');
    };
    reader.readAsDataURL(file);
}
function updateBgOpacity(v){
    const pct=v/100;
    document.getElementById('bg-layer').style.opacity=pct;
    document.getElementById('bg-overlay').style.opacity=0.92*(1-pct);
    document.getElementById('bgOpacityVal').textContent=v+'%';
}

/* ══════════════════════════════════════════
   Lyrics Picker — CSV 三级联选
   ══════════════════════════════════════════ */
let lyricsData=[], albumMap={};

async function loadLyricsCSV(){
    try{
        const resp=await fetch('lyrics.csv');
        const text=await resp.text();
        const lines=text.trim().split('\n');
        if(lines.length<2)return;
        for(let i=1;i<lines.length;i++){
            const cols=parseCSVLine(lines[i]);
            if(cols.length>=3&&cols[0]&&cols[1]&&cols[2])
                lyricsData.push({song:cols[0],album:cols[1],lyric:cols[2]});
        }
        albumMap={};
        lyricsData.forEach(row=>{
            if(!albumMap[row.album])albumMap[row.album]={};
            if(!albumMap[row.album][row.song])albumMap[row.album][row.song]=[];
            if(!albumMap[row.album][row.song].includes(row.lyric))
                albumMap[row.album][row.song].push(row.lyric);
        });
        const sel=document.getElementById('albumSelect');
        sel.innerHTML='<option value="">— 选择专辑 —</option>';
        Object.keys(albumMap).sort().forEach(a=>{sel.innerHTML+=`<option>${escHtml(a)}</option>`;});
        sel.disabled=false;
    }catch(e){console.warn('歌词加载失败:',e.message);}
}
function parseCSVLine(line){
    const r=[];let c='',q=false;
    for(let ch of line){
        if(ch==='"')q=!q;
        else if(ch===','&&!q){r.push(c.trim());c='';}
        else c+=ch;
    }
    r.push(c.trim());return r;
}
function onAlbumChange(){
    const a=document.getElementById('albumSelect').value;
    const ss=document.getElementById('songSelect'),ls=document.getElementById('lyricSelect');
    ss.innerHTML='<option value="">— 选择歌曲 —</option>';
    ls.innerHTML='<option value="">— 选择歌词 —</option>';
    document.getElementById('lyricPreview').textContent='选择专辑、歌曲、歌词后，此处预览…';
    document.getElementById('useLyricBtn').disabled=true;
    if(!a){ss.disabled=ls.disabled=true;return;}
    Object.keys(albumMap[a]||{}).sort().forEach(s=>{ss.innerHTML+=`<option>${escHtml(s)}</option>`;});
    ss.disabled=false;ls.disabled=true;
}
function onSongChange(){
    const a=document.getElementById('albumSelect').value;
    const s=document.getElementById('songSelect').value;
    const ls=document.getElementById('lyricSelect');
    ls.innerHTML='<option value="">— 选择歌词 —</option>';
    document.getElementById('lyricPreview').textContent='选择专辑、歌曲、歌词后，此处预览…';
    document.getElementById('useLyricBtn').disabled=true;
    if(!s){ls.disabled=true;return;}
    (albumMap[a][s]||[]).forEach((l,i)=>{ls.innerHTML+=`<option value="${i}">${escHtml(l.length>60?l.slice(0,60)+'…':l)}</option>`;});
    ls.disabled=false;
}
function onLyricChange(){
    const a=document.getElementById('albumSelect').value;
    const s=document.getElementById('songSelect').value;
    const i=document.getElementById('lyricSelect').value;
    if(i===''){document.getElementById('lyricPreview').textContent='…';document.getElementById('useLyricBtn').disabled=true;return;}
    const l=albumMap[a][s][parseInt(i)];
    document.getElementById('lyricPreview').textContent=`"${l}"`;
    document.getElementById('useLyricBtn').disabled=false;
}
function openLyricPicker(){document.getElementById('lyricModal').classList.add('show');}
function closeLyricPicker(){document.getElementById('lyricModal').classList.remove('show');}
function useLyric(){
    const l=document.getElementById('lyricPreview').textContent.replace(/^"|"$/g,'');
    const pw=document.getElementById('password');
    pw.value=l;pw.type='text';
    document.getElementById('togglePwd').textContent='🙈';
    document.getElementById('togglePwd').classList.add('active');
    closeLyricPicker();toast('✅ 歌词已填入密码框');
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.getElementById('lyricModal').addEventListener('click',function(e){if(e.target===this)closeLyricPicker();});
// 初始化
setTheme();
updateBgOpacity(document.getElementById('bgOpacity').value);
